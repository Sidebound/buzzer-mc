<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MC Buzzer(SideBound)</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 登録完了'))
                    .catch(err => console.log('Service Worker 登録失敗', err));
            });
        }
    </script>

    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="連絡用">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            touch-action: none !important;
            -webkit-text-size-adjust: none;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            height: 100vh; height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            padding-bottom: 20px;
            box-sizing: border-box;
        }

        /* --- 防護無線ボタン：左上へ移動 & 大型化 --- */
        #emergency-container {
            position: fixed; 
            top: 20px; 
            left: 20px; /* 右から左へ */
            width: 120px; /* 100pxから120pxへ大型化 */
            height: 120px;
            z-index: 30;
        }

        #emergency-btn {
            width: 100%; height: 100%;
            background-image: url('emergency_normal.png');
            background-size: contain; background-repeat: no-repeat;
            position: relative;
            cursor: pointer;
        }

        #emergency-btn.broken {
            background-image: url('emergency_broken.png');
        }

        #emergency-flash-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background-color: transparent;
            pointer-events: none;
        }

        @keyframes flash-white {
            0% { background-color: rgba(255, 255, 255, 1); }
            50% { background-color: transparent; }
            100% { background-color: rgba(255, 255, 255, 1); }
        }
        .is-flashing #emergency-flash-layer {
            animation: flash-white 0.3s infinite;
        }

        /* --- 設定アイコン：右上へ移動 --- */
        #settings-icon {
            position: fixed; 
            top: 20px; 
            right: 20px; /* 左から右へ */
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; color: rgba(255,255,255,0.8);
            cursor: pointer; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- 既存ブザー：配置維持 --- */
        #buzzer-display {
            position: relative;
            width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            background-image: url('image_buzzer1.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 30px;
        }

        #tap-area {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 55%; 
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            outline: none;
        }

        #buzzer-button-visual {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50%; height: 50%;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0);
            transition: background-color 0s;
            pointer-events: none;
        }

        #settings-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 15; }
        #settings-overlay.open { opacity: 1; visibility: visible; }
        #settings-panel { position: fixed; top: 0; right: -320px; width: 280px; max-width: 85vw; height: 100vh; height: 100dvh; background: rgba(20, 20, 20, 0.98); color: #fff; padding: 20px 20px 80px 20px; box-sizing: border-box; box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; overflow-y: auto; touch-action: pan-y !important; }
        #settings-panel.open { right: 0; }
        .setting-item { margin-bottom: 24px; text-align: center; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 5px; font-size: 16px !important; }
        button { width: 100%; padding: 12px; background: #6b8e23; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin-right: 5px; }
        #status-light.connected { background: #0f0; box-shadow: 0 0 10px #0f0; }
        #qrcode-container { background: white; padding: 10px; display: inline-block; margin: 10px auto; border-radius: 8px; box-sizing: border-box; max-width: 100%; }
        #qrcode img { max-width: 100% !important; height: auto !important; display: block; margin: 0 auto; }
        .copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; margin-left: 8px; background: #444; color: #fff; border-radius: 4px; cursor: pointer; vertical-align: middle; font-size: 14px; border: 1px solid #666; touch-action: auto !important; }
    </style>
</head>
<body>

    <div id="emergency-container">
        <div id="emergency-btn" onclick="handleEmergencyTap()">
            <div id="emergency-flash-layer"></div>
        </div>
    </div>

    <div id="buzzer-display">
        <div id="tap-area">
            <div id="buzzer-button-visual"></div>
        </div>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-icon" onclick="toggleSettings()">⚙</div>

    <div id="settings-panel">
        <div style="text-align: right; cursor: pointer; padding: 10px 0;" onclick="toggleSettings()">✖ 閉じる</div>
        <h3>通信設定</h3>
        <p><small>通信相手にQRコードを読んでもらうか、相手のIDを入力してください</small></p>
        <div class="setting-item">
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <p>
                <small id="my-id-display">ID発行中...</small>
                <span id="copy-btn" class="copy-btn" onclick="copyMyId()" style="display:none;">📋</span>
            </p>
        </div>
        <hr style="border: 0.5px solid #444; margin: 20px 0;">

        <div class="setting-item">
            <input type="text" id="peer-id" placeholder="通信相手のID(8文字)を入力">
            <button onclick="connectToPeer()">接続する</button>
        </div>
        <div class="setting-item"><p><span id="status-light"></span> <span id="status">待機中</span></p></div>
            
        <div class="setting-item">
            <label style="display: block; margin-bottom: 10px;">音色:</label>
            <select id="sound-select" onchange="loadNewSound()">
                <option value="ブザー1.mp3">ブザー１</option>
                <option value="ブザー2.mp3">ブザー２</option>
                <option value="電鈴1.mp3">電鈴１</option>
            </select>
        </div>

        <div class="setting-item">
            <label style="display: block; margin-bottom: 10px;">見た目:</label>
            <select id="image-select" onchange="changeBuzzerImage()">
                <option value="image_buzzer1.png">オリーブ</option>
                <option value="image_buzzer2.png">マルーン</option>
                <option value="image_buzzer3.png">連絡用</option>
            </select>
        </div>
    </div>

<script>
    /* JavaScriptロジックは一切変更せず、CSSによる配置変更のみを反映いたしました */
    if (navigator.vibrate) { navigator.vibrate = function() { return false; }; }

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let audioBuffer = null;
    let emergencyBuffer = null;
    let sourceNode = null;
    let emergencySource = null;
    let isLoadingSound = false;
    let wakeLock = null;
    let isEmergencyActive = false;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    async function loadSound(url, type = 'main') {
        isLoadingSound = true;
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
            if (type === 'main') audioBuffer = decodedData;
            if (type === 'emergency') emergencyBuffer = decodedData;
        } catch (e) { console.error(e); }
        finally { isLoadingSound = false; }
    }

    function handleEmergencyTap() {
        const btn = document.getElementById('emergency-btn');
        btn.classList.add('broken');
        if (!isEmergencyActive) { startEmergency(true); } else { stopEmergency(true); }
    }

    async function startEmergency(sendSignal = false) {
        if (isEmergencyActive) return;
        isEmergencyActive = true;
        document.getElementById('emergency-container').classList.add('is-flashing');
        if (emergencyBuffer) {
            if (audioCtx.state !== 'running') await audioCtx.resume();
            stopEmergencySound();
            emergencySource = audioCtx.createBufferSource();
            emergencySource.buffer = emergencyBuffer;
            emergencySource.loop = true;
            emergencySource.connect(audioCtx.destination);
            emergencySource.start(0);
        }
        if (sendSignal && conn && conn.open) conn.send('EMG_ON');
    }

    function stopEmergency(sendSignal = false) {
        isEmergencyActive = false;
        document.getElementById('emergency-container').classList.remove('is-flashing');
        stopEmergencySound();
        if (sendSignal && conn && conn.open) conn.send('EMG_OFF');
    }

    function stopEmergencySound() {
        if (emergencySource) {
            try { emergencySource.stop(); } catch(e) {}
            emergencySource = null;
        }
    }

    function changeBuzzerImage() {
        const select = document.getElementById('image-select');
        const display = document.getElementById('buzzer-display');
        const val = select.value;
        display.style.backgroundImage = `url('${val}')`;
        if (val.includes('buzzer3')) { display.style.borderRadius = "12px"; } else { display.style.borderRadius = "50%"; }
    }

    async function startBuzzer() {
        if (!audioBuffer || isLoadingSound) return;
        if (audioCtx.state !== 'running') { try { await audioCtx.resume(); } catch (e) {} }
        stopBuzzer();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.loop = true;
        sourceNode.connect(audioCtx.destination);
        sourceNode.start(0);
        if (!wakeLock) requestWakeLock();
    }

    function stopBuzzer() { if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; } }
    function loadNewSound() { loadSound(document.getElementById('sound-select').value); }

    loadSound('ブザー1.mp3', 'main');
    loadSound('emergency.mp3', 'emergency');

    function generateShortId() {
        const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        let res = '';
        for (let i = 0; i < 8; i++) { res += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return res;
    }

    const myId = generateShortId();
    const peer = new Peer(myId);
    let conn = null;
    let qrcode = null;
    let keepAliveInterval = null;

    function toggleSettings() {
        if (document.getElementById('settings-panel').classList.contains('open')) { document.activeElement.blur(); }
        document.getElementById('settings-panel').classList.toggle('open');
        document.getElementById('settings-overlay').classList.toggle('open');
    }

    function copyMyId() {
        navigator.clipboard.writeText(myId).then(() => {
            const btn = document.getElementById('copy-btn');
            const display = document.getElementById('my-id-display');
            const originalText = display.innerText;
            display.innerText = "コピー完了！";
            btn.style.display = "none";
            setTimeout(() => { display.innerText = originalText; btn.style.display = "inline-flex"; }, 2000);
        });
    }

    peer.on('open', (id) => { 
        document.getElementById('my-id-display').innerText = "あなたのID: " + id; 
        document.getElementById('copy-btn').style.display = "inline-flex"; 
        const inviteUrl = window.location.origin + window.location.pathname + "?id=" + id;
        if (!qrcode) { qrcode = new QRCode(document.getElementById("qrcode"), { text: inviteUrl, width: 180, height: 180, correctLevel : QRCode.CorrectLevel.M }); } else { qrcode.makeCode(inviteUrl); }
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        if (targetId && targetId.length === 8) { document.getElementById('peer-id').value = targetId; connectToPeer(targetId); }
    });

    peer.on('disconnected', () => { updateStatus(false); peer.reconnect(); });
    peer.on('connection', (incomingConn) => { if (conn) { conn.close(); } conn = incomingConn; setupConnection(); });

    function connectToPeer(targetId) {
        const rawId = targetId || document.getElementById('peer-id').value;
        const id = rawId.trim().toUpperCase();
        if(!id || id === myId || (conn && conn.peer === id)) return;
        if (conn) { conn.close(); }
        conn = peer.connect(id, { reliable: false });
        setupConnection();
    }

    function setupConnection() {
        if (!conn) return;
        conn.on('open', () => {
            updateStatus(true);
            setTimeout(toggleSettings, 1000);
            if (!wakeLock) requestWakeLock();
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(() => { if (conn && conn.open) { conn.send('HEARTBEAT'); } }, 20000);
        });
        conn.on('data', (data) => {
            if (data === 'ON') startBuzzer();
            else if (data === 'OFF') stopBuzzer();
            else if (data === 'EMG_ON') startEmergency(false);
            else if (data === 'EMG_OFF') stopEmergency(false);
        });
        conn.on('close', () => { updateStatus(false); if (keepAliveInterval) clearInterval(keepAliveInterval); });
        conn.on('error', () => { updateStatus(false); if (keepAliveInterval) clearInterval(keepAliveInterval); });
    }

    function updateStatus(isConnected) {
        const light = document.getElementById('status-light');
        const text = document.getElementById('status');
        if (isConnected) { light.classList.add('connected'); text.innerText = "接続完了！"; } else { light.classList.remove('connected'); text.innerText = "待機中"; conn = null; stopBuzzer(); stopEmergency(false); }
    }

    const area = document.getElementById('tap-area');
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    let lastTouchTime = 0;
    document.addEventListener('touchstart', (e) => {
        const now = Date.now();
        if (now - lastTouchTime <= 300) { e.preventDefault(); }
        lastTouchTime = now;
        if (e.touches.length > 1) { e.preventDefault(); }
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && !e.target.classList.contains('copy-btn')) { document.activeElement.blur(); }
    }, { passive: false });

    area.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); startBuzzer(); if (conn && conn.open) conn.send('ON'); }, { passive: false });
    area.addEventListener('pointerup', (e) => { e.preventDefault(); stopBuzzer(); if (conn && conn.open) conn.send('OFF'); }, { passive: false });
    area.addEventListener('pointerleave', (e) => { stopBuzzer(); if (conn && conn.open) conn.send('OFF'); }, false);

    window.oncontextmenu = function(e) { e.preventDefault(); e.stopPropagation(); return false; };
    toggleSettings();
</script>
</body>
</html>
