<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MC Buzzer(SideBound)</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 登録完了'))
                    .catch(err => console.log('Service Worker 登録失敗', err));
            });
        }
    </script>

    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="連絡用">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            touch-action: manipulation;
            -webkit-text-size-adjust: none;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent !important;
            box-sizing: border-box;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            height: 100vh; height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            padding-bottom: 20px;
        }

        /* --- 厳重注意事項モーダル --- */
        #warning-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
        }
        #warning-content {
            max-width: 400px; width: 95%;
            border: 2px solid #ff0000; background: #1a1a1a;
            padding: 25px; border-radius: 10px; text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        #warning-content h2 { color: #ff0000; margin-top: 0; font-size: 1.4rem; }
        #warning-content p { font-size: 0.95rem; line-height: 1.6; text-align: left; margin-bottom: 25px; }
        #agree-btn {
            background: #ff0000; color: #fff; border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%;
            font-size: 1.1rem;
        }

        /* --- 防護無線ボタン --- */
        #emergency-container {
            position: fixed; top: 15px; left: 15px;
            width: 45vw; height: 45vw;
            max-width: 240px; max-height: 240px;
            z-index: 30;
        }
        #emergency-btn {
            width: 100%; height: 100%;
            background-image: url('emergency1_normal.png');
            background-size: contain; background-repeat: no-repeat;
            position: relative; cursor: pointer;
        }
        #emergency-flash-layer {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%; background-color: transparent;
            pointer-events: none;
        }
        @keyframes flash-white {
            0% { background-color: rgba(255, 255, 255, 1); }
            50% { background-color: transparent; }
            100% { background-color: rgba(255, 255, 255, 1); }
        }
        .is-flashing #emergency-flash-layer { animation: flash-white 0.3s infinite; }

        /* --- 設定アイコン --- */
        #settings-icon {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; color: rgba(255,255,255,0.8);
            cursor: pointer; z-index: 40;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- メインブザー --- */
        #buzzer-display {
            position: relative; width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            background-image: url('buzzer1.png'); 
            background-size: cover; background-position: center;
            border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: border-radius 0.3s; margin-bottom: 30px;
        }
        #tap-area {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 55%; border-radius: 50%;
            cursor: pointer; z-index: 5;
            touch-action: none !important;
        }

        /* --- 設定パネル --- */
        #settings-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; 
            transition: opacity 0.3s; z-index: 90; 
        }
        #settings-overlay.open { opacity: 1; visibility: visible; }
        #settings-panel { 
            position: fixed; top: 0; right: -320px; width: 280px; max-width: 85vw; 
            height: 100vh; height: 100dvh; background: rgba(20, 20, 20, 0.98); 
            color: #fff; padding: 20px 20px 80px 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); 
            transition: right 0.3s; z-index: 100;
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .setting-item { margin-bottom: 24px; text-align: center; }
        .setting-label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #aaa; text-align: left; }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: #333; border: 1px solid #555; color: white; 
            border-radius: 5px; font-size: 16px !important; 
        }
        .panel-btn { 
            width: 100%; padding: 12px; background: #6b8e23; border: none; 
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; 
        }
        #status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin-right: 5px; }
        #status-light.connected { background: #0f0; box-shadow: 0 0 10px #0f0; }
        #qrcode-container { background: white; padding: 10px; display: inline-block; margin: 10px auto; border-radius: 8px; max-width: 100%; }
        #qrcode img { max-width: 100% !important; height: auto !important; display: block; margin: 0 auto; }
        .copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; margin-left: 8px; background: #444; color: #fff; border-radius: 4px; cursor: pointer; vertical-align: middle; font-size: 14px; border: 1px solid #666; }
    </style>
</head>
<body>

    <div id="warning-overlay">
        <div id="warning-content">
            <h2>【厳重注意事項】</h2>
            <p>
                本アプリは大人の電車ごっこ用です。<br><br>
                実際の<b>鉄道施設内、列車内、および線路付近</b>での使用は、列車の運行を妨害する恐れがあるため、<b>固く禁じます</b>。<br><br>
                万一、実際の運行に支障をきたした場合、制作者は一切の責任を負いません。
            </p>
            <button id="agree-btn">同意する</button>
        </div>
    </div>

    <div id="emergency-container">
        <div id="emergency-btn" onclick="handleEmergencyTap()">
            <div id="emergency-flash-layer"></div>
        </div>
    </div>

    <div id="buzzer-display">
        <div id="tap-area"></div>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-icon" onclick="toggleSettings()">⚙</div>

    <div id="settings-panel">
        <div style="text-align: right; cursor: pointer; padding: 10px 0;" onclick="toggleSettings()">✖ 閉じる</div>
        <h3>通信設定</h3>
        <div class="setting-item">
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <p><small id="my-id-display">ID発行中...</small><span id="copy-btn" class="copy-btn" onclick="copyMyId()" style="display:none;">📋</span></p>
        </div>
        <div class="setting-item">
            <input type="text" id="peer-id" placeholder="相手のIDを入力">
            <button class="panel-btn" onclick="connectToPeer()">接続する</button>
        </div>
        <div class="setting-item"><p><span id="status-light"></span> <span id="status">待機中</span></p></div>
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        <h3>ブザー設定</h3>
        <div class="setting-item"><label class="setting-label">音色:</label><select id="sound-select" onchange="loadNewSound()"><option value="1">ブザー１</option><option value="2">ブザー２</option><option value="3">電鈴１</option><option value="4">電鈴２（準備中）</option></select></div>
        <div class="setting-item"><label class="setting-label">見た目:</label><select id="image-select" onchange="changeBuzzerImage()"><option value="1">オリーブ</option><option value="2">マルーン</option><option value="3">連絡用</option></select></div>
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        <h3>防護無線設定</h3>
        <div class="setting-item"><label class="setting-label">音色:</label><select id="emg-sound-select" onchange="loadNewEmergencySound()"><option value="1">タイプ１</option><option value="2">タイプ２（準備中）</option><option value="3">タイプ３</option></select></div>
        <div class="setting-item"><label class="setting-label">見た目:</label><select id="emg-image-select" onchange="changeEmergencyImage()"><option value="1">タイプ１</option><option value="2">タイプ２</option></select></div>
    </div>

<script>
    const EMG_CONFIG = { "1": { flashSize: "22%", top: "50%" }, "2": { flashSize: "32%", top: "57%" } };
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let audioBuffer = null, emergencyBuffer = null, sourceNode = null, emergencySource = null;
    let isEmergencyActive = false, keepAliveTimer = null;

    // --- 起動初期化 ---
    document.getElementById('agree-btn').addEventListener('click', async () => {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        document.getElementById('warning-overlay').style.display = 'none';
        toggleSettings(); // 初回のみ設定を開く
    });

    function preloadImages(urls) { urls.forEach(url => { const img = new Image(); img.src = url; }); }

    async function loadSound(url, type = 'main') {
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
            if (type === 'main') audioBuffer = decodedData;
            if (type === 'emergency') emergencyBuffer = decodedData;
        } catch (e) { console.error("Sound Load Error:", e); }
    }

    // --- 防護無線 ---
    function handleEmergencyTap() {
        const btn = document.getElementById('emergency-btn');
        const type = document.getElementById('emg-image-select').value;
        if (!isEmergencyActive) { 
            isEmergencyActive = true; btn.style.backgroundImage = `url('emergency${type}_broken.png')`; 
            if (conn && conn.open) conn.send('EMG_ON'); startEmergencyActions(); 
        } else { 
            isEmergencyActive = false; if (conn && conn.open) conn.send('EMG_OFF'); stopEmergencyActions(); 
        }
    }

    async function startEmergencyActions() {
        document.getElementById('emergency-container').classList.add('is-flashing');
        if (!emergencyBuffer) await loadNewEmergencySound();
        if (emergencyBuffer) {
            if (audioCtx.state !== 'running') await audioCtx.resume();
            if (emergencySource) emergencySource.stop();
            emergencySource = audioCtx.createBufferSource(); emergencySource.buffer = emergencyBuffer;
            emergencySource.loop = true; emergencySource.connect(audioCtx.destination); emergencySource.start(0);
        }
    }

    function stopEmergencyActions() {
        document.getElementById('emergency-container').classList.remove('is-flashing');
        if (emergencySource) { try { emergencySource.stop(); } catch(e) {} emergencySource = null; }
    }

    function changeEmergencyImage() {
        const type = document.getElementById('emg-image-select').value;
        const btn = document.getElementById('emergency-btn');
        const flashLayer = document.getElementById('emergency-flash-layer');
        const config = EMG_CONFIG[type] || EMG_CONFIG["1"];
        flashLayer.style.width = config.flashSize; flashLayer.style.height = config.flashSize; flashLayer.style.top = config.top;
        btn.style.backgroundImage = isEmergencyActive ? `url('emergency${type}_broken.png')` : `url('emergency${type}_normal.png')`;
    }

    function loadNewEmergencySound() { const id = document.getElementById('emg-sound-select').value; return loadSound(`emergency${id}.mp3`, 'emergency'); }

    // --- ブザー ---
    function changeBuzzerImage() { const id = document.getElementById('image-select').value; const display = document.getElementById('buzzer-display'); display.style.backgroundImage = `url('buzzer${id}.png')`; display.style.borderRadius = id === "3" ? "12px" : "50%"; }
    function loadNewSound() { const id = document.getElementById('sound-select').value; loadSound(`buzzer${id}.mp3`, 'main'); }

    async function startBuzzer() {
        if (!audioBuffer) await loadNewSound();
        if (audioCtx.state !== 'running') await audioCtx.resume();
        if (sourceNode) sourceNode.stop();
        sourceNode = audioCtx.createBufferSource(); sourceNode.buffer = audioBuffer;
        sourceNode.loop = true; sourceNode.connect(audioCtx.destination); sourceNode.start(0);
    }
    function stopBuzzer() { if (sourceNode) { sourceNode.stop(); sourceNode = null; } }

    // --- 通信 ---
    function generateShortId() {
        const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        let res = ''; for (let i = 0; i < 8; i++) { res += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return res;
    }

    const myId = generateShortId();
    const peer = new Peer(myId);
    let conn = null, qrcode = null;

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('open');
        document.getElementById('settings-overlay').classList.toggle('open');
    }

    function copyMyId() {
        navigator.clipboard.writeText(myId).then(() => {
            const d = document.getElementById('my-id-display'); const old = d.innerText;
            d.innerText = "コピー完了！"; setTimeout(() => d.innerText = old, 2000);
        });
    }

    function startKeepAlive() {
        if (keepAliveTimer) clearInterval(keepAliveTimer);
        keepAliveTimer = setInterval(() => { if (conn && conn.open) { conn.send('PING'); } }, 30000);
    }

    peer.on('open', (id) => { 
        document.getElementById('my-id-display').innerText = "あなたのID: " + id; 
        document.getElementById('copy-btn').style.display = "inline-flex";
        const inviteUrl = window.location.origin + window.location.pathname + "?id=" + id;
        if (typeof QRCode !== 'undefined') {
            if (!qrcode) qrcode = new QRCode(document.getElementById("qrcode"), { text: inviteUrl, width: 160, height: 160 });
            else qrcode.makeCode(inviteUrl);
        }
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        if (targetId && targetId.length === 8 && targetId !== myId) {
            document.getElementById('peer-id').value = targetId; connectToPeer(targetId);
        }
    });

    peer.on('connection', (incomingConn) => { if (conn) conn.close(); conn = incomingConn; setupConnection(); });

    function connectToPeer(targetId) {
        const id = targetId || document.getElementById('peer-id').value.trim().toUpperCase();
        if(!id || id === myId) return;
        if (conn) conn.close(); conn = peer.connect(id); setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => { 
            updateStatus(true); loadNewSound(); loadNewEmergencySound(); startKeepAlive();
            setTimeout(toggleSettings, 1000);
        });
        conn.on('data', async (data) => {
            if (data === 'PING') return;
            if (data === 'ON') startBuzzer(); else if (data === 'OFF') stopBuzzer();
            else if (data === 'EMG_ON') startEmergencyActions(); else if (data === 'EMG_OFF') stopEmergencyActions();
        });
        conn.on('close', () => { updateStatus(false); if (keepAliveTimer) clearInterval(keepAliveTimer); });
    }

    function updateStatus(isConnected) {
        document.getElementById('status-light').classList.toggle('connected', isConnected);
        document.getElementById('status').innerText = isConnected ? "接続完了！" : "待機中";
    }

    // --- 操作イベント ---
    const area = document.getElementById('tap-area');
    area.addEventListener('pointerdown', (e) => {
        e.preventDefault(); 
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startBuzzer();
        if (conn && conn.open) conn.send('ON');
    }, { passive: false });

    area.addEventListener('pointerup', (e) => { e.preventDefault(); stopBuzzer(); if (conn && conn.open) conn.send('OFF'); }, { passive: false });
    area.addEventListener('pointerleave', (e) => { e.preventDefault(); stopBuzzer(); if (conn && conn.open) conn.send('OFF'); }, { passive: false });

    window.addEventListener('load', () => {
        loadNewSound(); loadNewEmergencySound();
        preloadImages(['emergency1_normal.png', 'emergency1_broken.png', 'emergency2_normal.png', 'emergency2_broken.png', 'buzzer1.png', 'buzzer2.png', 'buzzer3.png']);
        changeEmergencyImage();
    });
</script>
</body>
</html>
