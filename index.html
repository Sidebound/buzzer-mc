<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Buzzer Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            touch-action: none; 
            font-family: sans-serif;

            /* ★iOS Safariでの文字選択とメニュー表示を禁止しますわ */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .buzzer-container {
            position: relative;
            width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            background-image: url('image_6.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);

            /* ★画像のドラッグを禁止します */
            -webkit-user-drag: none;
        }

        #tap-area {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 55%; 
            border-radius: 50%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 5;
        }

        #buzzer-button-visual {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50%; height: 50%;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0);
            transition: background-color 0.05s;
            pointer-events: none;
        }

        #tap-area:active #buzzer-button-visual {
            background-color: rgba(255, 255, 255, 0.15);
        }

        #settings-icon {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 2rem; color: rgba(255,255,255,0.5);
            cursor: pointer; z-index: 10;
        }

        #settings-panel {
            position: fixed; top: 0; right: -300px;
            width: 280px; height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            color: #fff; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s ease-in-out;
            z-index: 20;
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .setting-item { margin-bottom: 20px; text-align: center; }
        
        input, select { 
            width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 10px; 
            background: #333; border: 1px solid #555; color: white; border-radius: 5px; 
            font-size: 16px;
        }
        label { display: block; text-align: left; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        button { width: 100%; padding: 12px; background: #6b8e23; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin-right: 5px; }
        #status-light.connected { background: #0f0; box-shadow: 0 0 10px #0f0; }

        #qrcode-container {
            background: white;
            padding: 15px;
            display: inline-block;
            margin-top: 10px;
            border-radius: 8px;
        }
        #qrcode img {
            width: 180px !important;
            height: 180px !important;
        }
    </style>
</head>
<body>

    <div class="buzzer-container">
        <div id="tap-area">
            <div id="buzzer-button-visual"></div>
        </div>
    </div>

    <div
