<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MC Buzzer(SideBound)</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 登録完了'))
                    .catch(err => console.log('Service Worker 登録失敗', err));
            });
        }
    </script>

    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="連絡用">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            touch-action: none !important;
            -webkit-text-size-adjust: none;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent !important;
            box-sizing: border-box;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            height: 100vh; height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            padding-bottom: 20px;
        }

        /* --- 防護無線ボタン --- */
        #emergency-container {
            position: fixed; top: 15px; left: 15px;
            width: 45vw; height: 45vw;
            max-width: 240px; max-height: 240px;
            z-index: 30;
        }

        #emergency-btn {
            width: 100%; height: 100%;
            background-image: url('emergency1_normal.png');
            background-size: contain; background-repeat: no-repeat;
            position: relative; cursor: pointer;
        }

        #emergency-flash-layer {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%; background-color: transparent;
            pointer-events: none;
        }

        @keyframes flash-white {
            0% { background-color: rgba(255, 255, 255, 1); }
            50% { background-color: transparent; }
            100% { background-color: rgba(255, 255, 255, 1); }
        }
        .is-flashing #emergency-flash-layer {
            animation: flash-white 0.3s infinite;
        }

        /* --- 設定アイコン --- */
        #settings-icon {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; color: rgba(255,255,255,0.8);
            cursor: pointer; z-index: 40;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- メインブザー --- */
        #buzzer-display {
            position: relative; width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            background-image: url('buzzer1.png'); 
            background-size: cover; background-position: center;
            border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: border-radius 0.3s; margin-bottom: 30px;
        }

        #tap-area {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 55%; border-radius: 50%;
            cursor: pointer; z-index: 5;
        }

        /* --- 設定パネル --- */
        #settings-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; 
            transition: opacity 0.3s; z-index: 90; 
        }
        #settings-overlay.open { opacity: 1; visibility: visible; }

        #settings-panel { 
            position: fixed; top: 0; right: -320px; width: 280px; max-width: 85vw; 
            height: 100vh; height: 100dvh; background: rgba(20, 20, 20, 0.98); 
            color: #fff; padding: 20px 20px 80px 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); 
            transition: right 0.3s; z-index: 100;
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }

        .setting-item { margin-bottom: 24px; text-align: center; }
        .setting-label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #aaa; text-align: left; }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: #333; border: 1px solid #555; color: white; 
            border-radius: 5px; font-size: 16px !important; 
        }
        button { 
            width: 100%; padding: 12px; background: #6b8e23; border: none; 
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; 
        }

        #status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin-right: 5px; }
        #status-light.connected { background: #0f0; box-shadow: 0 0 10px #0f0; }
        
        #qrcode-container { background: white; padding: 10px; display: inline-block; margin: 10px auto; border-radius: 8px; max-width: 100%; }
        #qrcode img { max-width: 100% !important; height: auto !important; display: block; margin: 0 auto; }
        .copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; margin-left: 8px; background: #444; color: #fff; border-radius: 4px; cursor: pointer; vertical-align: middle; font-size: 14px; border: 1px solid #666; }
    </style>
</head>
<body>

    <div id="emergency-container">
        <div id="emergency-btn" onclick="handleEmergencyTap()">
            <div id="emergency-flash-layer"></div>
        </div>
    </div>

    <div id="buzzer-display">
        <div id="tap-area"></div>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-icon" onclick="toggleSettings()">⚙</div>

    <div id="settings-panel">
        <div style="text-align: right; cursor: pointer; padding: 10px 0;" onclick="toggleSettings()">✖ 閉じる</div>
        
        <h3>通信設定</h3>
        <div class="setting-item">
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <p>
                <small id="my-id-display">ID発行中...</small>
                <span id="copy-btn" class="copy-btn" onclick="copyMyId()" style="display:none;">📋</span>
            </p>
        </div>
        <div class="setting-item">
            <input type="text" id="peer-id" placeholder="相手のID(8文字)を入力">
            <button onclick="connectToPeer()">接続する</button>
        </div>
        <div class="setting-item"><p><span id="status-light"></span> <span id="status">待機中</span></p></div>

        <hr style="border: 0.5px solid #444; margin: 20px 0;">

        <h3>ブザー設定</h3>
        <div class="setting-item">
            <label class="setting-label">音色:</label>
            <select id="sound-select" onchange="loadNewSound()">
                <option value="1">ブザー１</option>
                <option value="2">ブザー２</option>
                <option value="3">ブザー３</option>
            </select>
        </div>
        <div class="setting-item">
            <label class="setting-label">見た目:</label>
            <select id="image-select" onchange="changeBuzzerImage()">
                <option value="1">オリーブ</option>
                <option value="2">マルーン</option>
                <option value="3">連絡用</option>
            </select>
        </div>

        <hr style="border: 0.5px solid #444; margin: 20px 0;">

        <h3>防護無線設定</h3>
        <div class="setting-item">
            <label class="setting-label">音色:</label>
            <select id="emg-sound-select" onchange="loadNewEmergencySound()">
                <option value="1">タイプ１</option>
                <option value="2">タイプ２</option>
                <option value="3">タイプ３</option>
            </select>
        </div>
        <div class="setting-item">
            <label class="setting-label">見た目:</label>
            <select id="emg-image-select" onchange="changeEmergencyImage()">
                <option value="1">タイプ１</option>
                <option value="2">タイプ２</option>
            </select>
        </div>
    </div>

<script>
    const EMG_CONFIG = {
        "1": { flashSize: "22%", top: "50%" },
        "2": { flashSize: "32%", top: "60%" }
    };

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let audioBuffer = null, emergencyBuffer = null;
    let sourceNode = null, emergencySource = null;
    let isEmergencyActive = false;

    function preloadImages(urls) { urls.forEach(url => { const img = new Image(); img.src = url; }); }

    async function loadSound(url, type = 'main') {
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
            if (type === 'main') audioBuffer = decodedData;
            if (type === 'emergency') emergencyBuffer = decodedData;
            console.log(`${url} Loaded successfully`);
        } catch (e) { console.error("Sound Load Error:", e); }
    }

    // --- 防護無線 ロジック ---
    function handleEmergencyTap() {
        const btn = document.getElementById('emergency-btn');
        const type = document.getElementById('emg-image-select').value;
        if (!isEmergencyActive) { 
            btn.style.backgroundImage = `url('emergency${type}_broken.png')`;
            startEmergency(true); 
        } else { 
            stopEmergency(true); 
        }
    }

    function changeEmergencyImage() {
        const type = document.getElementById('emg-image-select').value;
        const btn = document.getElementById('emergency-btn');
        const flashLayer = document.getElementById('emergency-flash-layer');
        const config = EMG_CONFIG[type] || EMG_CONFIG["1"];
        
        flashLayer.style.width = config.flashSize;
        flashLayer.style.height = config.flashSize;
        flashLayer.style.top = config.top;

        const state = isEmergencyActive ? '_broken' : '_normal';
        btn.style.backgroundImage = `url('emergency${type}${state}.png')`;
    }

    function loadNewEmergencySound() {
        const id = document.getElementById('emg-sound-select').value;
        loadSound(`emergency${id}.mp3`, 'emergency');
    }

    async function startEmergency(sendSignal = false) {
        if (isEmergencyActive && !sendSignal) return;
        if (sendSignal) isEmergencyActive = true;
        
        // もしバッファが空なら、現在選択されている音色をロード（受信側対策）
        if (!emergencyBuffer) {
            await loadNewEmergencySound();
        }

        document.getElementById('emergency-container').classList.add('is-flashing');
        if (emergencyBuffer) {
            if (audioCtx.state !== 'running') await audioCtx.resume();
            if (emergencySource) emergencySource.stop();
            emergencySource = audioCtx.createBufferSource();
            emergencySource.buffer = emergencyBuffer;
            emergencySource.loop = true;
            emergencySource.connect(audioCtx.destination);
            emergencySource.start(0);
        }
        if (sendSignal && conn && conn.open) conn.send('EMG_ON');
    }

    function stopEmergency(sendSignal = false) {
        if (sendSignal) isEmergencyActive = false;
        document.getElementById('emergency-container').classList.remove('is-flashing');
        if (emergencySource) { try { emergencySource.stop(); } catch(e) {} emergencySource = null; }
        if (sendSignal && conn && conn.open) conn.send('EMG_OFF');
    }

    // --- ブザー ロジック ---
    function changeBuzzerImage() {
        const id = document.getElementById('image-select').value;
        const display = document.getElementById('buzzer-display');
        display.style.backgroundImage = `url('buzzer${id}.png')`;
        display.style.borderRadius = id === "3" ? "12px" : "50%";
    }

    function loadNewSound() {
        const id = document.getElementById('sound-select').value;
        loadSound(`buzzer${id}.mp3`, 'main');
    }

    async function startBuzzer() {
        if (!audioBuffer) await loadNewSound(); // ロード漏れ対策
        if (audioCtx.state !== 'running') await audioCtx.resume();
        if (sourceNode) sourceNode.stop();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.loop = true;
        sourceNode.connect(audioCtx.destination);
        sourceNode.start(0);
    }
    function stopBuzzer() { if (sourceNode) { sourceNode.stop(); sourceNode = null; } }

    // --- PeerJS / 通信ロジック ---
    function generateShortId() {
        const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        let res = '';
        for (let i = 0; i < 8; i++) { res += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return res;
    }

    const myId = generateShortId();
    const peer = new Peer(myId);
    let conn = null, qrcode = null;

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('open');
        document.getElementById('settings-overlay').classList.toggle('open');
    }

    function copyMyId() {
        navigator.clipboard.writeText(myId).then(() => {
            const d = document.getElementById('my-id-display');
            const old = d.innerText;
            d.innerText = "コピー完了！";
            setTimeout(() => d.innerText = old, 2000);
        });
    }

    peer.on('open', (id) => { 
        document.getElementById('my-id-display').innerText = "あなたのID: " + id; 
        document.getElementById('copy-btn').style.display = "inline-flex";
        const inviteUrl = window.location.origin + window.location.pathname + "?id=" + id;
        if (typeof QRCode !== 'undefined') {
            if (!qrcode) {
                qrcode = new QRCode(document.getElementById("qrcode"), { text: inviteUrl, width: 160, height: 160 });
            } else {
                qrcode.makeCode(inviteUrl);
            }
        }
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        if (targetId && targetId.length === 8 && targetId !== myId) {
            document.getElementById('peer-id').value = targetId;
            connectToPeer(targetId);
        }
    });

    peer.on('connection', (incomingConn) => { 
        if (conn) conn.close();
        conn = incomingConn; 
        setupConnection(); 
    });

    function connectToPeer(targetId) {
        const id = targetId || document.getElementById('peer-id').value.trim().toUpperCase();
        if(!id || id === myId) return;
        if (conn) conn.close();
        conn = peer.connect(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => { 
            updateStatus(true); 
            // 接続時に相手がどの音色を使っているか不明なため、とりあえず今の選択をロードしておく
            loadNewSound();
            loadNewEmergencySound();
            setTimeout(toggleSettings, 1000);
        });
        conn.on('data', async (data) => {
            if (data === 'ON') startBuzzer();
            else if (data === 'OFF') stopBuzzer();
            else if (data === 'EMG_ON') {
                isEmergencyActive = true;
                changeEmergencyImage();
                // 音声データがなければロードしてから開始
                if(!emergencyBuffer) await loadNewEmergencySound();
                startEmergency(false);
            }
            else if (data === 'EMG_OFF') { isEmergencyActive = false; stopEmergency(false); }
        });
        conn.on('close', () => updateStatus(false));
    }

    function updateStatus(isConnected) {
        document.getElementById('status-light').classList.toggle('connected', isConnected);
        document.getElementById('status').innerText = isConnected ? "接続完了！" : "待機中";
    }

    const area = document.getElementById('tap-area');
    area.addEventListener('pointerdown', (e) => { e.preventDefault(); startBuzzer(); if (conn) conn.send('ON'); });
    area.addEventListener('pointerup', () => { stopBuzzer(); if (conn) conn.send('OFF'); });

    window.addEventListener('load', () => {
        loadNewSound();
        loadNewEmergencySound();
        preloadImages([
            'emergency1_normal.png', 'emergency1_broken.png',
            'emergency2_normal.png', 'emergency2_broken.png',
            'buzzer1.png', 'buzzer2.png', 'buzzer3.png'
        ]);
        changeEmergencyImage();
    });

    toggleSettings();
</script>
</body>
</html>
