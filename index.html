<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MC Buzzer(SideBound)</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            touch-action: none !important;
            -webkit-text-size-adjust: none;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100dvh; width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            transition: background-color 0.1s;
        }

        /* 防護無線発報時の点滅アニメーション */
        @keyframes emergency-flash {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }
        .emergency-active {
            animation: emergency-flash 0.5s infinite !important;
        }

        /* レイアウト：メインブザーを下部へオフセット */
        #buzzer-display {
            position: relative;
            width: 85vw; height: 85vw;
            max-width: 450px; max-height: 450px;
            background-image: url('image_buzzer1.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-top: 80px; /* 上部にスペースを確保 */
            transition: border-radius 0.3s;
        }

        #tap-area {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 55%; border-radius: 50%;
            cursor: pointer; z-index: 5;
        }

        /* 右上の防護無線ボタン */
        #emergency-btn {
            position: fixed; top: 20px; right: 20px;
            width: 80px; height: 80px;
            background: #900; color: #fff;
            border: 4px solid #f00; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: bold; font-size: 14px; z-index: 30;
            box-shadow: 0 4px 10px rgba(255,0,0,0.5);
        }
        #emergency-btn:active { background: #f00; }

        /* 防護無線停止（確認）ボタン */
        #emergency-ack-btn {
            position: fixed; top: 120px; right: 20px;
            width: 80px; height: 40px;
            background: #444; color: #fff; border: 1px solid #999;
            border-radius: 5px; display: none; /* 通常は隠す */
            justify-content: center; align-items: center; font-size: 12px; z-index: 30;
        }

        #settings-icon {
            position: fixed; top: 20px; left: 20px;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; color: rgba(255,255,255,0.8);
            z-index: 10; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 設定パネル等は以前のものを継承（省略表示しますが機能は維持） */
        #settings-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); opacity: 0; visibility: hidden; z-index: 15; }
        #settings-overlay.open { opacity: 1; visibility: visible; }
        #settings-panel { position: fixed; top: 0; right: -320px; width: 280px; height: 100dvh; background: rgba(20, 20, 20, 0.98); color: #fff; padding: 20px; box-sizing: border-box; transition: right 0.3s; z-index: 20; overflow-y: auto; }
        #settings-panel.open { right: 0; }
        .setting-item { margin-bottom: 24px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 5px; font-size: 16px !important; }
        button { width: 100%; padding: 12px; background: #6b8e23; border: none; color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="emergency-btn" onclick="triggerEmergency()">防護<br>無線</div>
    <div id="emergency-ack-btn" onclick="acknowledgeEmergency()">確認</div>

    <div id="buzzer-display">
        <div id="tap-area"></div>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-icon" onclick="toggleSettings()">⚙</div>

    <div id="settings-panel">
        <div style="text-align: right; cursor: pointer; padding: 10px 0;" onclick="toggleSettings()">✖ 閉じる</div>
        <h3>通信設定</h3>
        <div class="setting-item">
            <div id="qrcode-container" style="background:white; padding:10px; display:inline-block; border-radius:8px;"><div id="qrcode"></div></div>
            <p><small id="my-id-display">ID発行中...</small></p>
        </div>
        <div class="setting-item">
            <input type="text" id="peer-id" placeholder="相手のIDを入力">
            <button onclick="connectToPeer()">接続する</button>
        </div>
        <div class="setting-item">
            <label>音色 / 見た目:</label>
            <select id="sound-select" onchange="loadNewSound()">
                <option value="ブザー1.mp3">ブザー１</option>
                <option value="ブザー2.mp3">ブザー２</option>
                <option value="電鈴1.mp3">電鈴１</option>
            </select>
            <select id="image-select" onchange="changeBuzzerImage()" style="margin-top:10px;">
                <option value="image_buzzer1.png">オリーブ</option>
                <option value="image_buzzer2.png">マルーン</option>
                <option value="image_buzzer3.png">連絡用</option>
            </select>
        </div>
    </div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let audioBuffer = null;
    let emergencyBuffer = null;
    let sourceNode = null;
    let emergencySource = null;
    let wakeLock = null;
    let isEmergency = false;

    // 音声読み込み
    async function loadSound(url, target) {
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const decoded = await audioCtx.decodeAudioData(arrayBuffer);
            if (target === 'main') audioBuffer = decoded;
            if (target === 'emergency') emergencyBuffer = decoded;
        } catch (e) { console.error(e); }
    }

    loadSound('ブザー1.mp3', 'main');
    loadSound('emergency.mp3', 'emergency');

    // 防護無線発報
    function triggerEmergency(remote = false) {
        if (isEmergency) return;
        isEmergency = true;
        document.body.classList.add('emergency-active');
        document.getElementById('emergency-ack-btn').style.display = 'flex';
        
        // 音再生
        playEmergencySound();

        // 相手にも送信
        if (!remote && conn && conn.open) conn.send('EMERGENCY_ON');
    }

    function playEmergencySound() {
        if (!emergencyBuffer) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        stopEmergencySound();
        emergencySource = audioCtx.createBufferSource();
        emergencySource.buffer = emergencyBuffer;
        emergencySource.loop = true;
        emergencySource.connect(audioCtx.destination);
        emergencySource.start(0);
    }

    function stopEmergencySound() {
        if (emergencySource) {
            try { emergencySource.stop(); } catch(e) {}
            emergencySource = null;
        }
    }

    // 確認ボタン（音を止めるが点滅は維持）
    function acknowledgeEmergency() {
        stopEmergencySound();
        document.getElementById('emergency-ack-btn').innerText = "復帰(長押し)";
        
        // 復帰処理（長押しなどでリセットする想定ですが、今回は簡易的にボタン変化）
        // ※完全に止める場合は以下を呼び出す仕組みに
    }

    // 完全にリセット（現状は手動リセット用に関数化）
    function resetEmergency() {
        isEmergency = false;
        stopEmergencySound();
        document.body.classList.remove('emergency-active');
        document.getElementById('emergency-ack-btn').style.display = 'none';
        document.getElementById('emergency-ack-btn').innerText = "確認";
    }

    // --- PeerJS関連（生存確認・iOS対応含む） ---
    const myId = Math.random().toString(36).substring(2, 10).toUpperCase();
    const peer = new Peer(myId);
    let conn = null;

    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = "あなたのID: " + id;
        new QRCode(document.getElementById("qrcode"), { text: window.location.href + "?id=" + id, width: 120, height: 120 });
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function connectToPeer() {
        const id = document.getElementById('peer-id').value.trim().toUpperCase();
        conn = peer.connect(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            setInterval(() => { if(conn.open) conn.send('PING'); }, 20000);
        });
        conn.on('data', (data) => {
            if (data === 'ON') startBuzzer();
            else if (data === 'OFF') stopBuzzer();
            else if (data === 'EMERGENCY_ON') triggerEmergency(true);
        });
    }

    // メインブザー
    function startBuzzer() {
        if (!audioBuffer) return;
        if (audioCtx.state !== 'running') audioCtx.resume();
        stopBuzzer();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.loop = true;
        sourceNode.connect(audioCtx.destination);
        sourceNode.start(0);
    }

    function stopBuzzer() {
        if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    }

    // タップイベント
    const area = document.getElementById('tap-area');
    area.addEventListener('pointerdown', () => { startBuzzer(); if(conn && conn.open) conn.send('ON'); });
    area.addEventListener('pointerup', () => { stopBuzzer(); if(conn && conn.open) conn.send('OFF'); });

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('open');
        document.getElementById('settings-overlay').classList.toggle('open');
    }
</script>
</body>
</html>
